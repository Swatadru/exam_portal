    /* ══════ QUESTION EDITOR ════════════════════════════════════════════════ */
    function QuestionEditor({ examId, editQ, onSave, onCancel }) {
      const exams = DB.get('exams', []);
      const blank = { examId: examId || exams[0]?.id || '', sectionId: '', type: 'mcq', num: 1, difficulty: 'medium', text: '', options: ['', '', '', ''], correct: null, explanation: '' };
      const [f, setF] = useState(editQ ? { ...editQ } : { ...blank, sectionId: (exams.find(e => e.id == (examId || exams[0]?.id))?.sections || [])[0]?.id || '' });
      const [gen, setGen] = useState(false);
      const notify = useN();
      const tRef = useRef(null);
      const eRef = useRef(null);

      useEffect(() => { if (editQ) setF({ ...editQ }); }, [editQ?.id]);

      const curExam = exams.find(e => e.id === f.examId);
      const sections = curExam?.sections || [];

      const s = k => v => setF(x => ({ ...x, [k]: typeof v === 'function' ? v(x[k]) : v }));
      const setOpt = (i, v) => setF(x => { const o = [...(x.options || [])]; o[i] = v; return { ...x, options: o }; });
      const addOpt = () => setF(x => ({ ...x, options: [...(x.options || []), '',] }));
      const rmOpt = (i) => setF(x => {
        const o = x.options.filter((_, j) => j !== i);
        let c = x.correct;
        if (x.type === 'mcq') { if (c === i) c = null; else if (typeof c === 'number' && c > i) c--; }
        if (x.type === 'msq') { c = Array.isArray(c) ? c.filter(n => n !== i).map(n => n > i ? n - 1 : n) : []; }
        return { ...x, options: o, correct: c };
      });
      const togCor = (i) => {
        if (f.type === 'mcq') { s('correct')(f.correct === i ? null : i); }
        else if (f.type === 'msq') {
          const cur = Array.isArray(f.correct) ? f.correct : [];
          s('correct')(cur.includes(i) ? cur.filter(x => x !== i) : [...cur, i]);
        }
      };
      const isCor = (i) => f.type === 'mcq' ? f.correct === i : (Array.isArray(f.correct) && f.correct.includes(i));

      const insertSym = (sym, ref) => {
        const el = ref?.current;
        const insert = '$' + sym + '$';
        if (el) {
          el.focus(); const ss = el.selectionStart, se = el.selectionEnd;
          const v = el.value.slice(0, ss) + insert + el.value.slice(se);
          if (ref === tRef) s('text')(v); else s('explanation')(v);
          setTimeout(() => el.setSelectionRange(ss + insert.length, ss + insert.length), 0);
        } else {
          if (ref === tRef) s('text')(t => (t || '') + insert); else s('explanation')(e => (e || '') + insert);
        }
      };

      const aiGenExpl = async () => {
        if (!f.text.trim()) { notify('Enter question text first', 'w'); return; }
        if (f.type !== 'numerical' && f.correct === null) { notify('Set the correct answer first', 'w'); return; }
        setGen(true);
        try {
          const caT = f.type === 'numerical' ? f.correct : f.type === 'mcq' ? (f.correct !== null && f.options ? f.options[f.correct] : '') : (Array.isArray(f.correct) && f.options ? f.correct.map(i => f.options[i]).join(', ') : '');
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{
                role: 'user', content: `Generate a complete, detailed step-by-step solution for this competitive exam question (JEE/GATE level).

Question: ${f.text}
Type: ${f.type}
${f.options?.length ? 'Options:\n' + f.options.map((o, i) => `(${String.fromCharCode(65 + i)}) ${o}`).join('\n') : ''}
Correct Answer: ${caT}

Include: all mathematical working, key formulas, why wrong options fail (for MCQ/MSQ), common mistakes.
Use $...$ for inline math, $$...$$ for display equations. Use **bold** for emphasis.`}]
            })
          });
          const data = await res.json();
          s('explanation')(data.content?.[0]?.text || '');
          notify('AI explanation generated!', 's');
        } catch { notify('Failed to generate. Check API connection.', 'e'); }
        finally { setGen(false); }
      };

      const save = () => {
        if (!f.examId) { notify('Select an exam', 'e'); return; }
        if (!f.sectionId) { notify('Select a section', 'e'); return; }
        if (!f.text.trim()) { notify('Question text required', 'e'); return; }
        if (f.type !== 'numerical') {
          if ((f.options || []).some(o => !o.trim())) { notify('Fill all option fields', 'e'); return; }
          if (f.correct === null || f.correct === undefined || (Array.isArray(f.correct) && !f.correct.length)) { notify('Mark the correct answer', 'e'); return; }
        } else {
          if (f.correct === null || f.correct === '' || f.correct === undefined) { notify('Enter correct numerical answer', 'e'); return; }
        }
        onSave({ ...f, id: editQ?.id || uid() });
      };

      return (
        <div className="qe-grid">
          {/* Left — editor */}
          <div className="qe-left">
            {/* Details */}
            <div className="card">
              <div className="chd">Question Details</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div className="fl" style={{ marginBottom: 0 }}>
                  <label className="flbl">Exam *</label>
                  <select className="fc" value={f.examId} onChange={e => { s('examId')(e.target.value); const ex = exams.find(x => x.id === e.target.value); s('sectionId')((ex?.sections || [])[0]?.id || ''); }}>
                    <option value="">Select exam</option>
                    {exams.map(e => <option key={e.id} value={e.id}>{e.title}</option>)}
                  </select>
                </div>
                <div className="fl" style={{ marginBottom: 0 }}>
                  <label className="flbl">Section *</label>
                  <select className="fc" value={f.sectionId} onChange={e => s('sectionId')(e.target.value)}>
                    {sections.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <div className="fl" style={{ marginBottom: 0 }}>
                  <label className="flbl">Type</label>
                  <select className="fc" value={f.type} onChange={e => setF(x => ({ ...x, type: e.target.value, correct: e.target.value === 'msq' ? [] : (e.target.value === 'numerical' ? null : null) }))}>
                    <option value="mcq">MCQ — Single Correct</option>
                    <option value="msq">MSQ — Multiple Correct</option>
                    <option value="numerical">Numerical Answer</option>
                  </select>
                </div>
                <div className="fl" style={{ marginBottom: 0 }}>
                  <label className="flbl">Difficulty</label>
                  <select className="fc" value={f.difficulty} onChange={e => s('difficulty')(e.target.value)}>
                    <option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option>
                  </select>
                </div>
              </div>
              <div style={{ marginTop: 10 }}>
                <label className="flbl">Q. Number</label>
                <input type="number" className="fc" style={{ width: 75 }} value={f.num} onChange={e => s('num')(parseInt(e.target.value) || 1)} min={1} />
              </div>
            </div>

            {/* Question text */}
            <div className="card">
              <div className="chd">Question Text <span style={{ fontWeight: 400, fontSize: 11, color: 'var(--text3)' }}>LaTeX: $inline$ or $$display$$</span></div>
              <div className="mh">
                {SYMS.map(([sym, lbl]) => (
                  <button key={sym} className="ms" title={'Insert: ' + sym} onClick={() => {
                    const el = tRef.current; const ins = '$' + sym + '$';
                    if (el) { el.focus(); const ss = el.selectionStart; const v = el.value.slice(0, ss) + ins + el.value.slice(el.selectionEnd); s('text')(v); setTimeout(() => el.setSelectionRange(ss + ins.length, ss + ins.length), 0); }
                    else s('text')(t => (t || '') + ins);
                  }}>{lbl}</button>
                ))}
              </div>
              <textarea ref={tRef} className="fc" rows={4} value={f.text} onChange={e => s('text')(e.target.value)} placeholder="Enter question. Use $...$ for inline math, $$...$$ for display math." />
            </div>

            {/* Options / Answer */}
            {f.type !== 'numerical' ? (
              <div className="card">
                <div className="chd">Options <span style={{ fontWeight: 400, fontSize: 11, color: 'var(--text3)' }}>— click ✓ to mark correct{f.type === 'msq' ? ' (multiple allowed)' : ''}</span></div>
                {(f.options || []).map((opt, i) => (
                  <div key={i} className="oe-row">
                    <div className="oe-key">{String.fromCharCode(65 + i)}</div>
                    <input className="fc" style={{ flex: 1 }} value={opt} onChange={e => setOpt(i, e.target.value)} placeholder={`Option ${String.fromCharCode(65 + i)} — supports $LaTeX$`} />
                    <div className={`ctog ${isCor(i) ? 'ck' : ''}`} onClick={() => togCor(i)} title="Mark as correct">
                      {isCor(i) && '✓'}
                    </div>
                    {(f.options || []).length > 2 && <button style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', padding: '0 4px', fontSize: 15 }} onClick={() => rmOpt(i)}>✕</button>}
                  </div>
                ))}
                <div className="flex ia g2 mt2">
                  <button className="btn btn-gray btn-sm" onClick={addOpt}>+ Add Option</button>
                  <span style={{ fontSize: 11, color: 'var(--text3)' }}>Green ✓ = correct answer</span>
                </div>
              </div>
            ) : (
              <div className="card">
                <div className="chd">Correct Numerical Answer</div>
                <input type="number" step="any" className="fc" style={{ width: 220 }} value={f.correct ?? ''} onChange={e => s('correct')(e.target.value === '' ? null : parseFloat(e.target.value))} placeholder="e.g. 4 or 3.14" />
                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 5 }}>Answer accepted with ±0.5% tolerance for floating-point errors.</div>
              </div>
            )}

            {/* Explanation */}
            <div className="card">
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 11 }}>
                <div className="chd" style={{ margin: 0 }}>Explanation / Solution <span style={{ fontWeight: 400, fontSize: 11, color: 'var(--text3)' }}>— LaTeX supported</span></div>
                <button className="btn btn-outline btn-sm" onClick={aiGenExpl} disabled={gen}>{gen ? 'Generating…' : '🤖 AI Generate'}</button>
              </div>
              <div className="mh">
                {SYMS.slice(0, 12).map(([sym, lbl]) => (
                  <button key={sym} className="ms" onClick={() => {
                    const el = eRef.current; const ins = '$' + sym + '$';
                    if (el) { el.focus(); const ss = el.selectionStart; const v = el.value.slice(0, ss) + ins + el.value.slice(el.selectionEnd); s('explanation')(v); setTimeout(() => el.setSelectionRange(ss + ins.length, ss + ins.length), 0); }
                    else s('explanation')(e => (e || '') + ins);
                  }}>{lbl}</button>
                ))}
              </div>
              <textarea ref={eRef} className="fc" rows={7} value={f.explanation || ''} onChange={e => s('explanation')(e.target.value)} placeholder="Step-by-step solution. **bold**, $inline$, $$display$$, \n for newline." />
              <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 5 }}>**text** → bold &nbsp;|&nbsp; $formula$ → inline math &nbsp;|&nbsp; $$formula$$ → display math &nbsp;|&nbsp; \n → newline</div>
            </div>

            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', paddingBottom: 20 }}>
              <button className="btn btn-gray" onClick={onCancel}>Cancel</button>
              <button className="btn btn-blue" onClick={save}>{editQ ? 'Update Question' : 'Save Question'}</button>
            </div>
          </div>

          {/* Right — preview */}
          <div className="qe-right">
            <div className="prev-lbl">Live Preview</div>
            <div className="qcard" style={{ boxShadow: 'none', border: '1px solid #e5e7eb' }}>
              <div className="qmeta">
                <div className="flex ia g2">
                  <span style={{ fontSize: 12, color: 'var(--text2)', fontWeight: 600 }}>Q{f.num}</span>
                  <span className={`qtype qtype-${f.type}`}>{f.type === 'mcq' ? 'MCQ' : f.type === 'msq' ? 'MSQ' : 'Numerical'}</span>
                  {f.difficulty && <span className="badge bg-gray" style={{ textTransform: 'capitalize' }}>{f.difficulty}</span>}
                </div>
              </div>
              <div className="qbody" style={{ minHeight: 36 }}>
                {f.text ? <MT text={f.text} /> : <span style={{ color: 'var(--text3)', fontStyle: 'italic' }}>Question text appears here…</span>}
              </div>
              {f.type !== 'numerical' && (f.options || []).map((opt, i) => (
                <div key={i} className={`opt ${isCor(i) ? f.type === 'msq' ? 'sel-m' : 'sel' : ''}`} style={{ cursor: 'default', marginBottom: 6 }}>
                  {f.type === 'mcq' ? <div className="opt-rd" style={{ borderColor: isCor(i) ? 'var(--blue)' : '#d1d5db', background: isCor(i) ? 'var(--blue)' : 'transparent' }}>{isCor(i) && <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#fff' }} />}</div>
                    : <div className="opt-cb" style={{ borderColor: isCor(i) ? '#7c3aed' : '#d1d5db', background: isCor(i) ? '#7c3aed' : 'transparent' }}>{isCor(i) && <span style={{ color: '#fff', fontSize: 11 }}>✓</span>}</div>}
                  <span className="opt-k">{String.fromCharCode(65 + i)}.</span>
                  <span className="opt-lbl">{opt ? <MT text={opt} /> : <span style={{ color: 'var(--text3)', fontStyle: 'italic' }}>Option {String.fromCharCode(65 + i)}</span>}</span>
                  {isCor(i) && <span style={{ fontSize: 10, color: 'var(--green)', fontWeight: 700, marginLeft: 'auto', whiteSpace: 'nowrap' }}>✓ Correct</span>}
                </div>
              ))}
              {f.type === 'numerical' && (
                <div style={{ marginTop: 8, padding: '9px 11px', background: '#f9fafb', borderRadius: 'var(--radius)', border: '1px solid var(--gray-bd)' }}>
                  <span style={{ fontSize: 12, color: 'var(--text2)' }}>Correct Answer: </span>
                  <strong className="tg">{f.correct ?? '—'}</strong>
                </div>
              )}
              {f.explanation && (
                <div style={{ marginTop: 13, padding: '11px', background: '#f0f9ff', border: '1px solid #bae6fd', borderRadius: 'var(--radius)' }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: '#0369a1', textTransform: 'uppercase', letterSpacing: '.4px', marginBottom: 7 }}>📖 Solution</div>
                  <div style={{ fontSize: 13, lineHeight: 1.9 }}><MT text={f.explanation} /></div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ══════ ADMIN QUESTION BANK ════════════════════════════════════════════ */
    function AdminQuestions({ defExam }) {
      const [qs, setQs] = useState(DB.get('questions', []));
      const exams = DB.get('exams', []);
      const [fEx, setFEx] = useState(defExam || exams[0]?.id || '');
      const [fSec, setFSec] = useState('');
      const [fType, setFType] = useState('');
      const [showEd, setShowEd] = useState(false);
      const [editQ, setEditQ] = useState(null);
      const notify = useN();
      const rf = () => setQs(DB.get('questions', []));
      const curExam = exams.find(e => e.id === fEx);
      const secs = curExam?.sections || [];
      const filtered = qs.filter(q => {
        if (fEx && q.examId !== fEx) return false;
        if (fSec && q.sectionId !== fSec) return false;
        if (fType && q.type !== fType) return false;
        return true;
      });

      const handleSave = (q) => {
        const all = DB.get('questions', []);
        DB.set('questions', editQ ? all.map(x => x.id === editQ.id ? q : x) : [...all, q]);
        rf(); setShowEd(false); notify(editQ ? 'Question updated!' : 'Question saved!', 's');
      };
      const del = (id) => { if (!confirm('Delete this question?')) return; DB.set('questions', DB.get('questions', []).filter(q => q.id !== id)); rf(); notify('Deleted', 's'); };

      if (showEd) return (
        <div className="main"><div className="mi">
          <div className="phd">
            <div><div className="ptitle">{editQ ? 'Edit Question' : 'New Question'}</div><div className="psub">Supports full LaTeX math rendering</div></div>
            <button className="btn btn-gray" onClick={() => setShowEd(false)}>← Back to Bank</button>
          </div>
          <QuestionEditor examId={fEx} editQ={editQ} onSave={handleSave} onCancel={() => setShowEd(false)} />
        </div></div>
      );

      const dc = { easy: 'var(--green)', medium: 'var(--amber)', hard: 'var(--red)' };
      return (
        <div className="main"><div className="mi">
          <div className="phd">
            <div><div className="ptitle">Question Bank</div><div className="psub">{filtered.length} question{filtered.length !== 1 ? 's' : ''}</div></div>
            <button className="btn btn-blue" onClick={() => { setEditQ(null); setShowEd(true); }}>+ New Question</button>
          </div>
          <div className="flex g2 mb3" style={{ flexWrap: 'wrap' }}>
            <select className="fc" style={{ width: 'auto' }} value={fEx} onChange={e => { setFEx(e.target.value); setFSec(''); }}>
              <option value="">All Exams</option>{exams.map(e => <option key={e.id} value={e.id}>{e.title}</option>)}
            </select>
            <select className="fc" style={{ width: 'auto' }} value={fSec} onChange={e => setFSec(e.target.value)}>
              <option value="">All Sections</option>{secs.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <select className="fc" style={{ width: 'auto' }} value={fType} onChange={e => setFType(e.target.value)}>
              <option value="">All Types</option><option value="mcq">MCQ</option><option value="msq">MSQ</option><option value="numerical">Numerical</option>
            </select>
          </div>
          {filtered.length === 0 ? (
            <div className="empty"><div style={{ fontSize: 36, marginBottom: 10 }}>❓</div><div style={{ fontWeight: 600 }}>No questions found</div><div className="tsm td mt2">Create your first question</div><button className="btn btn-blue mt3" onClick={() => { setEditQ(null); setShowEd(true); }}>+ New Question</button></div>
          ) : (
            filtered.map((q, idx) => {
              const secQ = exams.find(e => e.id === q.examId)?.sections?.find(s => s.id === q.sectionId);
              const corArr = Array.isArray(q.correct) ? q.correct : [q.correct];
              return (
                <div key={q.id} className="card" style={{ marginBottom: 9, padding: '13px 15px' }}>
                  <div className="flex ia jb" style={{ flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>
                    <div className="flex ia g2" style={{ flexWrap: 'wrap' }}>
                      <span style={{ fontWeight: 700, fontSize: 12, color: 'var(--text2)' }}>Q{q.num || idx + 1}</span>
                      <span className={`qtype qtype-${q.type}`}>{q.type.toUpperCase()}</span>
                      {secQ && <span style={{ fontSize: 11, color: secQ.color, border: `1px solid ${secQ.color}40`, padding: '1px 7px', borderRadius: 9999, background: secQ.bgColor || '#f9fafb' }}>{secQ.name}</span>}
                      {q.difficulty && <span style={{ fontSize: 11, color: dc[q.difficulty], fontWeight: 600, textTransform: 'capitalize' }}>{q.difficulty}</span>}
                    </div>
                    <div className="flex g2">
                      <button className="btn btn-outline btn-sm" onClick={() => { setEditQ(q); setShowEd(true); }}>Edit</button>
                      <button className="btn btn-sm" style={{ background: 'var(--red-lt)', color: 'var(--red)', border: '1px solid #fca5a5' }} onClick={() => del(q.id)}>Delete</button>
                    </div>
                  </div>
                  <div style={{ fontSize: 13, lineHeight: 1.75 }}><MT text={(q.text || '').slice(0, 220) + ((q.text || '').length > 220 ? '…' : '')} /></div>
                  {q.type !== 'numerical' && q.options && (
                    <div className="flex g2 mt2" style={{ flexWrap: 'wrap' }}>
                      {q.options.map((o, i) => {
                        const isC = corArr.map(Number).includes(i);
                        return (<span key={i} style={{ fontSize: 11, padding: '2px 8px', borderRadius: 3, background: isC ? 'var(--green-lt)' : '#f9fafb', border: `1px solid ${isC ? '#6ee7b7' : 'var(--gray-bd)'}`, color: isC ? 'var(--green)' : 'var(--text2)', fontWeight: isC ? 700 : 400 }}>
                          {String.fromCharCode(65 + i)}{isC ? ' ✓' : ''}
                        </span>);
                      })}
                    </div>
                  )}
                  {q.type === 'numerical' && <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 6 }}>Answer: <strong className="tg">{q.correct}</strong></div>}
                </div>
              );
            })
          )}
        </div></div>
      );
    }

    /* ══════ ADMIN STUDENTS ═════════════════════════════════════════════════ */
    function AdminStudents() {
      const [users, setUsers] = useState(DB.get('users', []).filter(u => u.role === 'student'));
      const [atts, setAtts] = useState(DB.get('attempts', []));
      const [confirmDel, setConfirmDel] = useState(null);// {uid, name} to confirm
      const notify = useN();

      const rf = () => { setUsers(DB.get('users', []).filter(u => u.role === 'student')); setAtts(DB.get('attempts', [])); };

      const clearStudentAttempts = (u) => {
        const remaining = DB.get('attempts', []).filter(a => a.userId !== u.id);
        DB.set('attempts', remaining);
        rf();
        setConfirmDel(null);
        notify(`All test records for ${u.name} cleared.`, 's');
      };

      const deleteStudent = (u) => {
        if (!window.confirm(`Delete student "${u.name}" and ALL their attempts? This cannot be undone.`)) return;
        const allUsers = DB.get('users', []).filter(x => x.id !== u.id);
        const remaining = DB.get('attempts', []).filter(a => a.userId !== u.id);
        DB.set('users', allUsers);
        DB.set('attempts', remaining);
        rf();
        notify(`Student ${u.name} deleted.`, 's');
      };

      return (
        <div className="main"><div className="mi">
          <div className="phd"><div className="ptitle">Students</div><div className="psub">{users.length} registered</div></div>
          <div className="tw">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Exams Taken</th><th>Avg Score</th><th>Tab Violations</th><th>Actions</th></tr></thead>
              <tbody>
                {users.length === 0 && <tr><td colSpan={7} style={{ textAlign: 'center', padding: 36, color: 'var(--text3)' }}>No students registered yet</td></tr>}
                {users.map(u => {
                  const ua = atts.filter(a => a.userId === u.id);
                  const avg = ua.length ? Math.round(ua.reduce((s, a) => s + (a.results?.score || 0), 0) / ua.length) : '—';
                  const viols = ua.reduce((s, a) => s + (a.tabWarnings || 0), 0);
                  return (<tr key={u.id}>
                    <td>
                      <div className="flex ia g2">
                        <div style={{ width: 26, height: 26, borderRadius: '50%', background: 'var(--blue)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: 11, flexShrink: 0 }}>{u.name.charAt(0).toUpperCase()}</div>
                        <span style={{ fontWeight: 600 }}>{u.name}</span>
                      </div>
                    </td>
                    <td className="tsm tm">{u.email}</td>
                    <td className="tsm td">{u.joinDate}</td>
                    <td className="tb f7">{ua.length}</td>
                    <td className="tg f6">{avg}</td>
                    <td>{viols > 0 ? <span className="badge bg-red">{viols}</span> : '—'}</td>
                    <td>
                      <div className="flex g2">
                        {ua.length > 0 && (
                          <button className="btn btn-sm" style={{ background: '#fff7ed', color: '#b45309', border: '1px solid #fcd34d' }}
                            onClick={() => setConfirmDel(u)}>
                            Clear Tests
                          </button>
                        )}
                        <button className="btn btn-sm" style={{ background: 'var(--red-lt)', color: 'var(--red)', border: '1px solid #fca5a5' }}
                          onClick={() => deleteStudent(u)}>
                          Delete
                        </button>
                      </div>
                    </td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>

          {/* Confirm clear modal */}
          {confirmDel && (
            <div className="ov">
              <div className="mo" style={{ maxWidth: 420 }}>
                <div className="moh"><h3>⚠ Clear Test Records</h3><button className="mox" onClick={() => setConfirmDel(null)}>✕</button></div>
                <div className="mob">
                  <p style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 12 }}>
                    You are about to delete <strong>all exam attempt records</strong> for student:
                  </p>
                  <div style={{ background: '#f8fafc', border: '1px solid var(--gray-bd)', borderRadius: 4, padding: '11px 14px', marginBottom: 14 }}>
                    <div style={{ fontWeight: 700 }}>{confirmDel.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text2)' }}>{confirmDel.email}</div>
                    <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4 }}>
                      {atts.filter(a => a.userId === confirmDel.id).length} attempt record(s) will be permanently deleted.
                    </div>
                  </div>
                  <div style={{ background: 'var(--red-lt)', border: '1px solid #fca5a5', borderRadius: 4, padding: '9px 12px', fontSize: 12, color: 'var(--red)' }}>
                    ⚠ This action cannot be undone. The student's account will remain active.
                  </div>
                </div>
                <div className="mof">
                  <button className="btn btn-gray" onClick={() => setConfirmDel(null)}>Cancel</button>
                  <button className="btn btn-red" onClick={() => clearStudentAttempts(confirmDel)}>Yes, Clear All Records</button>
                </div>
              </div>
            </div>
          )}
        </div></div>
      );
    }

    /* ══════ ADMIN RESULTS ══════════════════════════════════════════════════ */
    function AdminResults() {
      const [atts, setAtts] = useState(DB.get('attempts', []));
      const [filterExam, setFilterExam] = useState('');
      const [filterStudent, setFilterStudent] = useState('');
      const exams = DB.get('exams', []);
      const users = DB.get('users', []);
      const notify = useN();
      const fmt = s => { const m = Math.floor(s / 60), ss = s % 60; return `${m}m ${ss}s`; };

      const rf = () => setAtts(DB.get('attempts', []));

      const delAttempt = (id) => {
        if (!window.confirm('Delete this attempt record permanently?')) return;
        DB.set('attempts', DB.get('attempts', []).filter(a => a.id !== id));
        rf();
        notify('Attempt record deleted.', 's');
      };

      const delAllForExam = (examId) => {
        const count = atts.filter(a => a.examId === examId).length;
        if (!window.confirm(`Delete ALL ${count} attempt record(s) for this exam? Cannot be undone.`)) return;
        DB.set('attempts', DB.get('attempts', []).filter(a => a.examId !== examId));
        rf();
        notify(`${count} records deleted.`, 's');
      };

      const students = users.filter(u => u.role === 'student');
      const filtered = atts.filter(a => {
        if (filterExam && a.examId !== filterExam) return false;
        if (filterStudent && a.userId !== filterStudent) return false;
        return true;
      });

      return (
        <div className="main"><div className="mi">
          <div className="phd">
            <div><div className="ptitle">All Results</div><div className="psub">{filtered.length} record(s)</div></div>
            {filtered.length > 0 && filterExam && (
              <button className="btn btn-sm" style={{ background: 'var(--red-lt)', color: 'var(--red)', border: '1px solid #fca5a5' }}
                onClick={() => delAllForExam(filterExam)}>
                🗑 Delete All for This Exam
              </button>
            )}
          </div>

          {/* Filters */}
          <div className="flex g2 mb3" style={{ flexWrap: 'wrap' }}>
            <select className="fc" style={{ width: 'auto' }} value={filterExam} onChange={e => setFilterExam(e.target.value)}>
              <option value="">All Exams</option>
              {exams.map(e => <option key={e.id} value={e.id}>{e.title}</option>)}
            </select>
            <select className="fc" style={{ width: 'auto' }} value={filterStudent} onChange={e => setFilterStudent(e.target.value)}>
              <option value="">All Students</option>
              {students.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
            </select>
            {(filterExam || filterStudent) && (
              <button className="btn btn-gray btn-sm" onClick={() => { setFilterExam(''); setFilterStudent(''); }}>Clear Filters</button>
            )}
          </div>

          {filtered.length === 0 ? <div className="empty"><div style={{ fontSize: 36, marginBottom: 10 }}>📊</div><div style={{ fontWeight: 600 }}>{atts.length === 0 ? 'No results yet' : 'No results match the filters'}</div></div> : (
            <div className="tw">
              <table>
                <thead><tr><th>Student</th><th>Exam</th><th>Score</th><th>Correct</th><th>Wrong</th><th>Accuracy</th><th>Time</th><th>Tab Viols</th><th>Date</th><th>Reason</th><th>Action</th></tr></thead>
                <tbody>{[...filtered].reverse().map(a => {
                  const ex = exams.find(e => e.id === a.examId);
                  const u = users.find(x => x.id === a.userId);
                  const ac = Math.round((a.results?.correct || 0) / (a.results?.total || 1) * 100);
                  return (<tr key={a.id}>
                    <td style={{ fontWeight: 600 }}>{u?.name || 'Unknown'}</td>
                    <td className="tsm tm">{ex?.title?.slice(0, 24) || '—'}</td>
                    <td className="tb f7">{a.results?.score || 0}</td>
                    <td className="tg f6">{a.results?.correct || 0}</td>
                    <td className="tr f6">{a.results?.wrong || 0}</td>
                    <td><span style={{ color: ac > 70 ? 'var(--green)' : ac > 40 ? 'var(--amber)' : 'var(--red)', fontWeight: 600 }}>{ac}%</span></td>
                    <td className="tsm tm">{fmt(a.totalTime || 0)}</td>
                    <td>{(a.tabWarnings || 0) > 0 ? <span className="badge bg-red">{a.tabWarnings}</span> : '—'}</td>
                    <td className="tsm td">{new Date(a.date).toLocaleDateString('en-IN')}</td>
                    <td>{a.reason === 'fullscreen_exit' ? <span className="badge bg-red">FS Exit</span> : a.reason === 'timer' ? <span className="badge bg-amber">Timeout</span> : <span className="badge bg-green">Manual</span>}</td>
                    <td>
                      <button className="btn btn-sm" style={{ background: 'var(--red-lt)', color: 'var(--red)', border: '1px solid #fca5a5' }}
                        onClick={() => delAttempt(a.id)} title="Delete this record">
                        🗑 Delete
                      </button>
                    </td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          )}
        </div></div>
      );
    }

    /* ══════ STUDENT RESULTS ════════════════════════════════════════════════ */
    function StudentResults({ user, onResult }) {
      const atts = DB.get('attempts', []).filter(a => a.userId === user.id);
      const exams = DB.get('exams', []);
      return (
        <div className="main"><div className="mi">
          <div className="phd"><div className="ptitle">My Results</div></div>
          {atts.length === 0 ? <div className="empty"><div style={{ fontSize: 36, marginBottom: 10 }}>📊</div><div style={{ fontWeight: 600 }}>No results yet</div><div className="tsm td mt2">Attempt an exam to see your results here</div></div> : (
            <div className="tw">
              <table>
                <thead><tr><th>Exam</th><th>Score</th><th>Correct</th><th>Wrong</th><th>Accuracy</th><th>Date</th><th></th></tr></thead>
                <tbody>{[...atts].reverse().map(a => {
                  const ex = exams.find(e => e.id === a.examId);
                  const ac = Math.round((a.results?.correct || 0) / (a.results?.total || 1) * 100);
                  return (<tr key={a.id}>
                    <td style={{ fontWeight: 600 }}>{ex?.title || '—'}</td>
                    <td className="tb f7">{a.results?.score || 0}</td>
                    <td className="tg f6">{a.results?.correct || 0}</td>
                    <td className="tr f6">{a.results?.wrong || 0}</td>
                    <td><span style={{ color: ac > 70 ? 'var(--green)' : ac > 40 ? 'var(--amber)' : 'var(--red)', fontWeight: 600 }}>{ac}%</span></td>
                    <td className="tsm td">{new Date(a.date).toLocaleDateString('en-IN')}</td>
                    <td><button className="btn btn-outline btn-sm" onClick={() => onResult(a)}>Review</button></td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          )}
        </div></div>
      );
    }

    /* ══════ ROOT APP ════════════════════════════════════════════════════════ */
    function App() {
      const [view, setView] = useState('auth');
      const [user, setUser] = useState(null);
      const [nav, setNav] = useState('dashboard');
      const [pendingExam, setPendingExam] = useState(null);// waiting for modal
      const [fsExam, setFsExam] = useState(null);         // waiting for fullscreen
      const [activeExam, setActiveExam] = useState(null);
      const [activeResult, setActiveResult] = useState(null);
      const [qbExam, setQbExam] = useState(null);
      const notify = useN();

      const login = (u) => { setUser(u); setNav('dashboard'); setView('dashboard'); };
      const logout = () => {
        try { if (document.fullscreenElement) document.exitFullscreen(); } catch { }
        setUser(null); setView('auth'); setActiveExam(null); setFsExam(null); setPendingExam(null);
      };

      /* Role guard */
      const guardedNav = (id) => {
        if (user?.role === 'student' && ['exams_manage', 'questions', 'students', 'results_admin'].includes(id)) {
          notify('Access denied. Admin only.', 'e'); return;
        }
        setNav(id);
      };

      const startExam = (exam) => {
        const qc = DB.get('questions', []).filter(q => q.examId === exam.id).length;
        if (qc === 0) { notify('This exam has no questions yet.', 'e'); return; }
        setPendingExam(exam);
      };
      const confirmExam = () => { setFsExam(pendingExam); setPendingExam(null); };
      const enterFs = () => { setActiveExam(fsExam); setFsExam(null); setView('exam'); };
      const submitExam = (att) => { setActiveResult(att); setActiveExam(null); setView('result'); };
      const viewResult = (att) => { setActiveResult(att); setView('result'); };

      if (view === 'auth') return <AuthPage onLogin={login} />;

      if (view === 'exam' && activeExam) return (
        <NotifProvider>
          <ExamInterface exam={activeExam} user={user} onSubmit={submitExam} onFsCancel={() => { setActiveExam(null); setView('dashboard'); try { if (document.fullscreenElement) document.exitFullscreen(); } catch { } }} />
        </NotifProvider>
      );

      /* Fullscreen gate screen */
      if (fsExam) return (
        <FsGate onEnter={enterFs} onBack={() => { setFsExam(null); setPendingExam(null); }} />
      );

      const topbarTitle = () => {
        if (user?.role === 'admin') return 'Admin Portal';
        const titles = { dashboard: 'Dashboard', exams: 'Available Exams', results: 'My Results' };
        return titles[nav] || 'Student Portal';
      };

      const renderMain = () => {
        /* STRICT ROLE CHECK: students only see student pages */
        if (user?.role === 'student') {
          if (nav === 'dashboard' || nav === 'exams') return <StudentDashboard user={user} onStart={startExam} onResult={viewResult} />;
          if (nav === 'results') return <StudentResults user={user} onResult={viewResult} />;
          return <StudentDashboard user={user} onStart={startExam} onResult={viewResult} />;
        }
        if (user?.role === 'admin') {
          if (nav === 'dashboard') return <AdminDash />;
          if (nav === 'exams') return <AdminExams onGotoQ={(id) => { setQbExam(id); setNav('questions'); }} />;
          if (nav === 'questions') return <AdminQuestions defExam={qbExam} />;
          if (nav === 'students') return <AdminStudents />;
          if (nav === 'results') return <AdminResults />;
        }
        return null;
      };

      if (view === 'result' && activeResult) {
        const exam = DB.get('exams', []).find(e => e.id === activeResult.examId);
        return (
          <div className="layout">
            <div className="topbar">
              <div className="tbar-logo">Chhatro Bondhu Exam Portal<small>ছাত্র বন্ধু পরীক্ষা পোর্টাল</small></div>
              <div className="tbar-r">
                <div className="tbar-user">
                  <div className="tbar-av">{user?.name?.charAt(0).toUpperCase()}</div>
                  <span>{user?.name}</span>
                </div>
              </div>
            </div>
            <Sidebar user={user} active={nav} setActive={guardedNav} onLogout={logout} />
            {exam && <ResultPage attempt={activeResult} exam={exam} onBack={() => setView('dashboard')} />}
          </div>
        );
      }

      return (
        <div className="layout">
          <div className="topbar">
            <div className="tbar-logo">Chhatro Bondhu Exam Portal<small>ছাত্র বন্ধু পরীক্ষা পোর্টাল</small></div>
            <div className="tbar-sep" />
            <span style={{ fontSize: 12, color: 'rgba(255,255,255,.7)' }}>{topbarTitle()}</span>
            <div className="tbar-r">
              <div className="tbar-user">
                <div className="tbar-av">{user?.name?.charAt(0).toUpperCase()}</div>
                <span>{user?.name}</span>
                <span className="badge bg-blue" style={{ textTransform: 'capitalize' }}>{user?.role}</span>
              </div>
              <button className="tbar-btn" onClick={logout}>Sign Out</button>
            </div>
          </div>
          <Sidebar user={user} active={nav} setActive={guardedNav} onLogout={logout} />
          {renderMain()}

          {/* Exam Start Modal */}
          {pendingExam && <ExamStartModal exam={pendingExam} onConfirm={confirmExam} onCancel={() => setPendingExam(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <NotifProvider><App /></NotifProvider>
    );
  </script>
</body>

</html>
